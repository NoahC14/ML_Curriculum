<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#ffffff"/>
  <line x1="70" y1="300" x2="585" y2="300" stroke="#1f3a5f" stroke-width="1.8"/>
  <line x1="90" y1="330" x2="90" y2="45" stroke="#1f3a5f" stroke-width="1.8"/>
  <path d="M110,250 C170,210 220,170 280,145 C335,122 395,112 470,102"
